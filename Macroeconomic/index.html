<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macroeconomic Data Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header-left">
                <h1>Macroeconomic Data Dashboard</h1>
            </div>
            <div class="header-right">
                <select id="regionSelect" class="select-control">
                    <option value="china">中国</option>
                    <option value="usa">美国</option>
                    <option value="europe">欧元区</option>
                    <option value="global">全球</option>
                </select>
                <select id="timeRangeSelect" class="select-control">
                    <option value="1m">近1个月</option>
                    <option value="3m">近3个月</option>
                    <option value="6m">近6个月</option>
                    <option value="1y" selected>近1年</option>
                    <option value="5y">近5年</option>
                </select>
                <button id="refreshBtn" class="btn-refresh">刷新数据</button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <h3>数据指标</h3>
                <ul class="indicator-list">
                    <li class="indicator-item active" data-indicator="gdp">
                        <span class="indicator-icon">📈</span>
                        <span class="indicator-name">GDP增长率</span>
                    </li>
                    <li class="indicator-item" data-indicator="cpi">
                        <span class="indicator-icon">💰</span>
                        <span class="indicator-name">CPI通胀率</span>
                    </li>
                    <li class="indicator-item" data-indicator="unemployment">
                        <span class="indicator-icon">👥</span>
                        <span class="indicator-name">失业率</span>
                    </li>
                    <li class="indicator-item" data-indicator="interest">
                        <span class="indicator-icon">🏦</span>
                        <span class="indicator-name">利率</span>
                    </li>
                    <li class="indicator-item" data-indicator="m2">
                        <span class="indicator-icon">💵</span>
                        <span class="indicator-name">M2货币供应</span>
                    </li>
                    <li class="indicator-item" data-indicator="pmi">
                        <span class="indicator-icon">📊</span>
                        <span class="indicator-name">PMI指数</span>
                    </li>
                    <li class="indicator-item" data-indicator="trade">
                        <span class="indicator-icon">🌍</span>
                        <span class="indicator-name">贸易差额</span>
                    </li>
                    <li class="indicator-item" data-indicator="housing">
                        <span class="indicator-icon">🏠</span>
                        <span class="indicator-name">房价指数</span>
                    </li>
                </ul>
                <div class="sidebar-footer">
                    <p>数据更新时间</p>
                    <p id="lastUpdate" class="update-time">--</p>
                </div>
            </aside>

            <section class="content">
                <div class="kpi-cards">
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title">当前值</span>
                            <span class="kpi-trend positive">↑</span>
                        </div>
                        <div class="kpi-value" id="currentValue">--</div>
                        <div class="kpi-footer">
                            <span class="kpi-label">较上月</span>
                            <span class="kpi-change" id="monthChange">--</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title">季度均值</span>
                            <span class="kpi-trend neutral">→</span>
                        </div>
                        <div class="kpi-value" id="quarterAvg">--</div>
                        <div class="kpi-footer">
                            <span class="kpi-label">季度同比</span>
                            <span class="kpi-change" id="quarterChange">--</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title">年度目标</span>
                            <span class="kpi-trend" id="targetTrend">--</span>
                        </div>
                        <div class="kpi-value" id="annualTarget">--</div>
                        <div class="kpi-footer">
                            <span class="kpi-label">完成进度</span>
                            <span class="kpi-change" id="targetProgress">--</span>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-header">
                            <span class="kpi-title">历史分位</span>
                            <span class="kpi-trend" id="percentile">--</span>
                        </div>
                        <div class="kpi-value" id="percentileValue">--</div>
                        <div class="kpi-footer">
                            <span class="kpi-label">5年区间</span>
                            <span class="kpi-change" id="range5y">--</span>
                        </div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card large">
                        <div class="chart-header">
                            <h3>历史趋势</h3>
                            <div class="chart-actions">
                                <button class="chart-btn active" data-view="line">折线图</button>
                                <button class="chart-btn" data-view="bar">柱状图</button>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3>同比变化</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="yoyChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3>分布情况</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="distributionChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="data-table-section">
                    <div class="section-header">
                        <h3>详细数据</h3>
                        <button id="exportBtn" class="btn-export">导出CSV</button>
                    </div>
                    <div class="table-container">
                        <table class="data-table" id="dataTable">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>指标值</th>
                                    <th>环比变化</th>
                                    <th>同比变化</th>
                                    <th>分位值</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                            </tbody>
                        </table>
<div class="pagination-controls" id="paginationControls">
    <div class="pagination-info" id="paginationInfo"></div>
    <div class="pagination-buttons">
        <button class="pagination-btn" id="prevPage" onclick="changePage(-1)">上一页</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="pagination-btn" id="nextPage" onclick="changePage(1)">下一页</button>
    </div>
</div>
                    </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
